<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Melissa &amp; Levi</title>

  <!-- Fonts: Cormorant Garamond (display serif) + Jost (sans labels/body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
    }
    html, body, #root { margin: 0; padding: 0; }
    body {
      background: #F4EEE3;
      overflow-x: hidden;
      /* Safe area insets for notched phones */
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Touch targets: any interactive element gets min 44×44 ── */
    button, a, [role="button"] {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── iOS input zoom fix: font-size must be ≥16px on focus ── */
    input, select, textarea {
      font-size: 16px !important;
    }
    /* Keep MUI label visual size but prevent zoom on the input itself */
    .MuiOutlinedInput-input, .MuiSelect-select {
      font-size: 16px !important;
    }

    /* ── Scroll reveal — content ALWAYS visible; animation is enhancement ── */
    .reveal { }
    .reveal.in { animation: revealUp 0.9s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal.in { animation: none; }
    }

    /* ── Prevent horizontal scroll from letter-spacing on small screens ── */
    @media (max-width: 375px) {
      .MuiTypography-root { letter-spacing: 0.01em !important; }
    }

    ::selection { background: #1C1B19; color: #F4EEE3; }
  </style>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <!-- MUI v5 (UMD, bundles Emotion) -->
  <script src="https://unpkg.com/@mui/material@5.15.20/umd/material-ui.development.js" crossorigin="anonymous"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="theme.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="whenwhere.jsx"></script>
  <script type="text/babel" src="rsvp.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
